<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Debug - Quiet Companion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 顶栏 */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      flex-shrink: 0;
    }
    .toolbar button {
      padding: 3px 10px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #333;
      color: #ccc;
      font-size: 11px;
      cursor: pointer;
    }
    .toolbar button:hover { background: #444; }
    .toolbar button.active { background: #0e639c; border-color: #0e639c; color: #fff; }
    .toolbar .spacer { flex: 1; }
    .toolbar .count { color: #888; font-size: 11px; }

    /* 分类筛选 */
    .filters {
      display: flex;
      gap: 4px;
      padding: 4px 12px;
      background: #2d2d2d;
      border-bottom: 1px solid #3c3c3c;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 2px 8px;
      border: 1px solid #444;
      border-radius: 3px;
      background: transparent;
      color: #888;
      font-size: 11px;
      cursor: pointer;
    }
    .filter-btn.active { color: #fff; border-color: #888; }
    .filter-btn[data-cat="state"] { border-color: #4ec9b0; }
    .filter-btn[data-cat="state"].active { background: #4ec9b0; color: #000; }
    .filter-btn[data-cat="drag"] { border-color: #dcdcaa; }
    .filter-btn[data-cat="drag"].active { background: #dcdcaa; color: #000; }
    .filter-btn[data-cat="tts"] { border-color: #9cdcfe; }
    .filter-btn[data-cat="tts"].active { background: #9cdcfe; color: #000; }
    .filter-btn[data-cat="observer"] { border-color: #ce9178; }
    .filter-btn[data-cat="observer"].active { background: #ce9178; color: #000; }
    .filter-btn[data-cat="chat"] { border-color: #c586c0; }
    .filter-btn[data-cat="chat"].active { background: #c586c0; color: #000; }
    .filter-btn[data-cat="ai"] { border-color: #b5cea8; }
    .filter-btn[data-cat="ai"].active { background: #b5cea8; color: #000; }
    .filter-btn[data-cat="error"] { border-color: #f44747; }
    .filter-btn[data-cat="error"].active { background: #f44747; color: #fff; }

    /* 日志区域 */
    .log-container {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .log-line {
      padding: 1px 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.5;
    }
    .log-line:hover { background: #2a2d2e; }
    .log-time { color: #6a9955; margin-right: 8px; }
    .log-cat {
      display: inline-block;
      min-width: 70px;
      margin-right: 8px;
      padding: 0 4px;
      border-radius: 2px;
      text-align: center;
      font-weight: 600;
    }
    .log-cat.state { color: #4ec9b0; }
    .log-cat.drag { color: #dcdcaa; }
    .log-cat.tts { color: #9cdcfe; }
    .log-cat.observer { color: #ce9178; }
    .log-cat.chat { color: #c586c0; }
    .log-cat.ai { color: #b5cea8; }
    .log-cat.error { color: #f44747; }
    .log-msg { color: #d4d4d4; }
    .log-line.error .log-msg { color: #f44747; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="clearBtn">Clear</button>
    <button id="pauseBtn">Pause</button>
    <div class="spacer"></div>
    <span class="count" id="countDisplay">0 logs</span>
  </div>
  <div class="filters">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn active" data-cat="state">State</button>
    <button class="filter-btn active" data-cat="drag">Drag</button>
    <button class="filter-btn active" data-cat="tts">TTS</button>
    <button class="filter-btn active" data-cat="observer">Observer</button>
    <button class="filter-btn active" data-cat="chat">Chat</button>
    <button class="filter-btn active" data-cat="ai">AI</button>
    <button class="filter-btn active" data-cat="error">Error</button>
  </div>
  <div class="log-container" id="logContainer"></div>

  <script>
    var logContainer = document.getElementById('logContainer');
    var countDisplay = document.getElementById('countDisplay');
    var pauseBtn = document.getElementById('pauseBtn');
    var clearBtn = document.getElementById('clearBtn');
    var paused = false;
    var logCount = 0;
    var activeFilters = new Set(['state', 'drag', 'tts', 'observer', 'chat', 'ai', 'error']);

    // 分类筛选
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cat = this.dataset.cat;
        if (cat === 'all') {
          var allActive = document.querySelectorAll('.filter-btn[data-cat]:not([data-cat="all"])');
          var anyInactive = false;
          allActive.forEach(function(b) { if (!b.classList.contains('active')) anyInactive = true; });
          allActive.forEach(function(b) {
            if (anyInactive) b.classList.add('active');
            else b.classList.remove('active');
          });
          activeFilters = anyInactive
            ? new Set(['state', 'drag', 'tts', 'observer', 'chat', 'ai', 'error'])
            : new Set();
        } else {
          this.classList.toggle('active');
          if (this.classList.contains('active')) activeFilters.add(cat);
          else activeFilters.delete(cat);
        }
        applyFilters();
      });
    });

    function applyFilters() {
      document.querySelectorAll('.log-line').forEach(function(line) {
        var cat = line.dataset.cat;
        line.style.display = activeFilters.has(cat) ? '' : 'none';
      });
    }

    // 暂停/继续
    pauseBtn.addEventListener('click', function() {
      paused = !paused;
      this.textContent = paused ? 'Resume' : 'Pause';
      this.classList.toggle('active', paused);
    });

    // 清空
    clearBtn.addEventListener('click', function() {
      logContainer.innerHTML = '';
      logCount = 0;
      countDisplay.textContent = '0 logs';
    });

    // 检查是否在底部附近（50px 以内）
    function isNearBottom() {
      return logContainer.scrollHeight - logContainer.scrollTop - logContainer.clientHeight < 50;
    }

    // 自动滚动到底部（只在用户已经在底部时）
    function scrollToBottom() {
      if (!paused && isNearBottom()) {
        logContainer.scrollTop = logContainer.scrollHeight;
      }
    }

    // 接收日志
    // @ts-ignore
    window.companion.onLog(function(data) {
      if (paused) return;

      var line = document.createElement('div');
      line.className = 'log-line' + (data.category === 'error' ? ' error' : '');
      line.dataset.cat = data.category;

      var time = document.createElement('span');
      time.className = 'log-time';
      time.textContent = data.time;

      var cat = document.createElement('span');
      cat.className = 'log-cat ' + data.category;
      cat.textContent = data.category.toUpperCase();

      var msg = document.createElement('span');
      msg.className = 'log-msg';
      msg.textContent = data.message;

      line.appendChild(time);
      line.appendChild(cat);
      line.appendChild(msg);
      logContainer.appendChild(line);

      logCount++;
      countDisplay.textContent = logCount + ' logs';

      // 限制最大行数
      if (logContainer.children.length > 500) {
        logContainer.removeChild(logContainer.children[0]);
      }

      scrollToBottom();
      applyFilters();
    });
  </script>
</body>
</html>
